<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Detalhes da camisa selecionada na vitrine GFI Connect, com fotos, tamanhos e compra pelo WhatsApp."
    />
    <title>Produto | GFI Connect</title>
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="assets/logos/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container site-header__inner">
        <a class="brand" href="index.html" aria-label="Voltar para a vitrine">
          <img src="assets/logos/gfi-cbf-menu-banner-transparent.png" alt="CBF e GFI Connect" width="300" height="92" />
        </a>
        <nav class="site-nav site-nav--simple" aria-label="Navegacao do produto">
          <a href="index.html#produtos">Voltar aos produtos</a>
          <a href="index.html#como-funciona">Como funciona</a>
        </nav>
      </div>
    </header>

    <main class="product-page">
      <section class="section">
        <div class="container product-detail">
          <div class="product-gallery">
            <div class="product-gallery__main">
              <img id="product-main-image" src="" alt="" />
            </div>
            <div id="product-thumbs" class="product-thumbs" aria-label="Fotos do produto"></div>
          </div>

          <article class="product-info">
            <a class="back-link" href="index.html#produtos">Voltar para vitrine</a>
            <span id="product-category" class="product-info__category"></span>
            <h1 id="product-title"></h1>
            <p id="product-description" class="product-info__description"></p>
            <p id="product-price" class="product-info__price"></p>

            <div class="product-info__block">
              <h2>Tamanhos disponiveis</h2>
              <div id="product-sizes" class="size-list"></div>
            </div>

            <div class="product-info__block">
              <h2>Destaques</h2>
              <ul id="product-highlights" class="highlight-list"></ul>
            </div>

            <a
              id="product-buy"
              class="btn btn--whatsapp product-info__buy"
              href="https://wa.me/"
              target="_blank"
              rel="noopener noreferrer"
            >
              Comprar pelo WhatsApp
            </a>
            <p class="product-info__note">
              O WhatsApp esta sem numero fixo por enquanto. Quando definido, basta preencher
              <strong>whatsappNumber</strong> em <strong>js/config.js</strong>.
            </p>
          </article>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container site-footer__bottom">
        <p>&copy; <span id="footer-year"></span> Shir7 x GFI Connect. Compra finalizada manualmente.</p>
      </div>
    </footer>

    <script type="module" src="js/product-page.js"></script>
  </body>
</html>
